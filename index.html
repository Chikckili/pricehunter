<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chollos">
<meta name="mobile-web-app-capable" content="yes">
<title>Chollos</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d1a;--bg2:#13131f;--bg3:#1a1a2e;
  --card:#161625;--card2:#1e1e35;
  --accent:#7c6ff7;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text:#f0f0ff;--t2:#9090b8;--t3:#5a5a80;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --r:14px;--rs:8px
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;height:100dvh;height:100vh;
  display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.hdr{background:var(--bg3);padding:12px 16px 0;
  border-bottom:1px solid var(--b1);flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:19px;font-weight:700;letter-spacing:-.3px}
.logo b{color:var(--accent)}
.hdr-icons{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;background:var(--card2);border:1px solid var(--b2);
  border-radius:var(--rs);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative}
.badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;
  background:var(--red);border-radius:8px;font-size:9px;font-weight:700;
  color:#fff;display:flex;align-items:center;justify-content:center;
  padding:0 3px;border:2px solid var(--bg3)}

/* ── SOURCES ── */
.sources{display:flex;gap:6px;margin-bottom:10px}
.src-btn{flex:1;padding:7px 4px;background:var(--card2);border:1px solid var(--b2);
  border-radius:var(--rs);color:var(--t2);font-size:12px;font-weight:600;
  cursor:pointer;text-align:center;transition:all .15s}
.src-btn.on{background:rgba(124,111,247,.2);border-color:var(--accent);color:var(--accent)}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f-chip{flex-shrink:0;padding:5px 11px;background:var(--card2);border:1px solid var(--b2);
  border-radius:20px;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .15s}
.f-chip.on{background:rgba(124,111,247,.15);border-color:var(--accent);color:var(--accent)}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* ── PANELS ── */
.pnl{display:none}.pnl.on{display:block}

/* ── DEAL CARD ── */
.deal{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);
  margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;
  position:relative}
.deal:active{border-color:var(--b2)}
.deal.seen{opacity:.55}
.deal-img{width:100%;height:130px;object-fit:cover;display:block;background:var(--bg3)}
.deal-img.thumb{height:100px;object-fit:contain;padding:8px;background:var(--bg3)}
.deal-body{padding:10px 12px}
.deal-store{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:4px}
.deal-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;
  margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.deal-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.deal-price{font-size:18px;font-weight:700;color:var(--green)}
.deal-prev{font-size:12px;color:var(--t3);text-decoration:line-through}
.deal-disc{font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:rgba(239,68,68,.15);color:var(--red)}
.deal-votes{margin-left:auto;display:flex;align-items:center;gap:3px;
  font-size:13px;font-weight:700;color:var(--red)}
.deal-foot{display:flex;align-items:center;gap:6px;padding:6px 12px 10px;
  font-size:11px;color:var(--t3);border-top:1px solid var(--b1)}
.deal-cat{background:var(--card2);padding:2px 7px;border-radius:10px;font-size:10px}
.deal-time{margin-left:auto}
.hot-badge{position:absolute;top:8px;left:8px;
  background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.fav-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;
  background:rgba(0,0,0,.5);border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:14px;
  backdrop-filter:blur(4px);border:none;cursor:pointer}

/* ── TEMP SLIDER ── */
.temp-wrap{display:flex;align-items:center;gap:8px;
  padding:8px 0 10px;font-size:12px;color:var(--t2)}
.temp-wrap input{flex:1;accent-color:var(--accent)}
.temp-val{font-weight:700;color:var(--accent);min-width:32px;text-align:right}

/* ── FAVORITES / HISTORY PANEL ── */
.panel-title{font-size:12px;font-weight:700;color:var(--t3);
  letter-spacing:.8px;text-transform:uppercase;margin:4px 0 10px}
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--t3);line-height:1.6}

/* ── BOTTOM NAV ── */
.bnav{display:flex;background:var(--bg3);border-top:1px solid var(--b1);
  padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;position:relative}
.bnav .bi{font-size:20px}
.bnav .bl{font-size:10px;color:var(--t3)}
.bnav button.on .bl{color:var(--accent)}

/* ── MISC ── */
.ldr{display:flex;flex-direction:column;align-items:center;
  gap:12px;padding:50px 20px;color:var(--t3);font-size:13px}
.spin{width:24px;height:24px;border:2px solid var(--b2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rel-btn{width:100%;padding:11px;background:var(--card2);
  border:1px solid var(--b2);border-radius:var(--r);
  color:var(--t2);font-size:13px;cursor:pointer;margin-top:4px}
.clear-btn{width:100%;padding:10px;background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);border-radius:var(--r);
  color:var(--red);font-size:13px;cursor:pointer;margin-top:8px}
.cap{font-size:10px;color:var(--t3);text-align:center;padding:4px 0 8px}
.ibar{background:rgba(124,111,247,.08);border:1px solid rgba(124,111,247,.25);
  border-radius:var(--rs);padding:8px 12px;font-size:12px;
  color:var(--accent);margin-bottom:10px}

/* ── TOAST ── */
#toast{position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--card2);border:1px solid var(--b2);color:var(--text);
  padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;
  transition:opacity .25s,transform .25s;pointer-events:none;
  white-space:nowrap;max-width:90vw;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">🔥 Choll<b>os</b></div>
      <div class="hdr-icons">
        <button class="icon-btn" id="notifBtn" title="Notificaciones">🔔</button>
        <button class="icon-btn" id="historyBtn" title="Vistos">🕐</button>
        <button class="icon-btn" id="favsBtn" title="Favoritos">
          ⭐
          <span class="badge" id="favsBadge" style="display:none">0</span>
        </button>
      </div>
    </div>

    <!-- SOURCE SELECTOR -->
    <div class="sources" id="sourceBtns">
      <button class="src-btn on" data-src="chollometro">🇪🇸 Chollometro</button>
      <button class="src-btn"    data-src="dealabs">🌍 Dealabs</button>
    </div>

    <!-- CATEGORY FILTERS -->
    <div class="filters" id="catFilters">
      <span class="f-chip on" data-cat="">Todos</span>
      <span class="f-chip" data-cat="Electrónica">📱 Electrónica</span>
      <span class="f-chip" data-cat="Gaming">🎮 Gaming</span>
      <span class="f-chip" data-cat="Hogar">🏠 Hogar</span>
      <span class="f-chip" data-cat="Moda">👗 Moda</span>
      <span class="f-chip" data-cat="Alimentación">🍕 Alimentación</span>
      <span class="f-chip" data-cat="Viajes">✈️ Viajes</span>
      <span class="f-chip" data-cat="Deporte">⚽ Deporte</span>
    </div>

    <!-- TEMP FILTER -->
    <div class="temp-wrap">
      <span>🌡️ Mín.</span>
      <input type="range" id="tempSlider" min="0" max="500" step="50" value="0">
      <span class="temp-val" id="tempVal">0°</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="scroll">

    <!-- DEALS PANEL -->
    <div id="pnl-deals" class="pnl on">
      <div id="newBar" style="display:none" class="ibar"></div>
      <div id="dealsBody">
        <div class="ldr"><div class="spin"></div><span>Cargando chollos…</span></div>
      </div>
    </div>

    <!-- FAVORITES PANEL -->
    <div id="pnl-favs" class="pnl">
      <div id="favsBody"></div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="pnl-history" class="pnl">
      <div id="historyBody"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav" id="bnav">
    <button data-tab="deals" class="on"><span class="bi">🔥</span><span class="bl">Chollos</span></button>
    <button data-tab="favs"        ><span class="bi">⭐</span><span class="bl">Favoritos</span></button>
    <button data-tab="history"     ><span class="bi">🕐</span><span class="bl">Vistos</span></button>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function setHTML(id,h){ var e=$(id); if(e) e.innerHTML=h; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ return n?new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n):''; }
function loader(m){ return '<div class="ldr"><div class="spin"></div><span>'+esc(m)+'</span></div>'; }
function toast(msg,dur){
  var e=$('toast'); e.textContent=msg; e.classList.add('show');
  clearTimeout(e._t); e._t=setTimeout(function(){ e.classList.remove('show'); },dur||2800);
}
function pPrice(s){
  if(!s) return 0;
  var c=String(s).replace(/[^0-9.,]/g,'');
  if(!c) return 0;
  if(/,\d{2}$/.test(c)) return parseFloat(c.replace(/\./g,'').replace(',','.'));
  return parseFloat(c.replace(',',''))||0;
}
function relTime(d){
  var s=Math.floor((Date.now()-d)/1000);
  if(s<60) return 'hace '+s+'s';
  if(s<3600) return 'hace '+Math.floor(s/60)+' min';
  if(s<86400) return 'hace '+Math.floor(s/3600)+'h';
  return 'hace '+Math.floor(s/86400)+'d';
}
function store(k,v){ try{ if(v===undefined) return JSON.parse(localStorage.getItem(k)||'null'); localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

// ─── STATE ────────────────────────────────────────────────────────────────────
var ACTIVE_TAB  = 'deals';
var ACTIVE_SRC  = 'chollometro';
var ACTIVE_CAT  = '';
var MIN_TEMP    = 0;
var ALL_DEALS   = [];        // raw fetched items for current source
var FAVS        = store('ch_favs')  || {};   // { id: deal }
var HISTORY     = store('ch_hist')  || {};   // { id: timestamp }
var LAST_SEEN   = store('ch_last')  || {};   // { src: isoDate } — for new deals counter
var CACHE       = {};        // { src: { items, fetchedAt } }

var RSS2J = 'https://api.rss2json.com/v1/api.json?rss_url=';
var FEEDS = {
  chollometro: 'https://www.chollometro.com/rss',
  dealabs    : 'https://www.dealabs.com/rss'
};

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
document.querySelectorAll('#bnav button').forEach(function(b){
  b.addEventListener('click', function(){ switchTab(b.getAttribute('data-tab')); });
});
$('favsBtn').addEventListener('click', function(){ switchTab('favs'); });
$('historyBtn').addEventListener('click', function(){ switchTab('history'); });

function switchTab(tab){
  ACTIVE_TAB = tab;
  document.querySelectorAll('#bnav button').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-tab')===tab);
  });
  ['deals','favs','history'].forEach(function(t){
    var p=$('pnl-'+t); if(p) p.classList.toggle('on',t===tab);
  });
  if(tab==='favs')    renderFavs();
  if(tab==='history') renderHistory();
  if(tab==='deals')   applyFilters();
}

// ─── SOURCE SWITCHING ─────────────────────────────────────────────────────────
document.querySelectorAll('#sourceBtns .src-btn').forEach(function(b){
  b.addEventListener('click', function(){
    var src = b.getAttribute('data-src');
    if(src === ACTIVE_SRC) return;
    ACTIVE_SRC = src;
    document.querySelectorAll('#sourceBtns .src-btn').forEach(function(x){
      x.classList.toggle('on', x.getAttribute('data-src')===src);
    });
    loadDeals(src);
  });
});

// ─── CATEGORY FILTER ─────────────────────────────────────────────────────────
document.querySelectorAll('#catFilters .f-chip').forEach(function(c){
  c.addEventListener('click', function(){
    ACTIVE_CAT = c.getAttribute('data-cat');
    document.querySelectorAll('#catFilters .f-chip').forEach(function(x){
      x.classList.toggle('on', x.getAttribute('data-cat')===ACTIVE_CAT);
    });
    applyFilters();
  });
});

// ─── TEMPERATURE FILTER ──────────────────────────────────────────────────────
$('tempSlider').addEventListener('input', function(){
  MIN_TEMP = parseInt(this.value);
  $('tempVal').textContent = MIN_TEMP+'°';
  applyFilters();
});

// ─── LOAD DEALS ──────────────────────────────────────────────────────────────
function loadDeals(src, forceRefresh){
  src = src || ACTIVE_SRC;
  // Use cache if fresh (< 3 min) and not forcing refresh
  if(!forceRefresh && CACHE[src] && (Date.now()-CACHE[src].fetchedAt) < 180000){
    ALL_DEALS = CACHE[src].items;
    checkForNew(src, ALL_DEALS);
    applyFilters();
    return;
  }

  setHTML('dealsBody', loader('Cargando chollos…'));
  setHTML('newBar',''); $('newBar').style.display='none';

  fetch(RSS2J + encodeURIComponent(FEEDS[src]))
    .then(function(r){ return r.ok ? r.json() : Promise.reject('http-'+r.status); })
    .then(function(data){
      if(!data || data.status==='error') throw new Error(data.message||'rss-error');
      var items = parseDeals(data.items||[], src);
      CACHE[src] = { items:items, fetchedAt:Date.now() };
      ALL_DEALS  = items;
      checkForNew(src, items);
      applyFilters();
    })
    .catch(function(err){
      console.warn('Feed error:', err);
      setHTML('dealsBody',
        '<div class="empty-state"><div class="empty-icon">⚠️</div>'
        +'<div class="empty-title">No se pudo cargar</div>'
        +'<div class="empty-sub">Comprueba tu conexión e inténtalo de nuevo.</div></div>'
        +'<button class="rel-btn" id="retryBtn">🔄 Reintentar</button>');
      var rb=$('retryBtn');
      if(rb) rb.addEventListener('click',function(){ loadDeals(src,true); });
    });
}

// ─── PARSE DEALS ─────────────────────────────────────────────────────────────
function parseDeals(items, src){
  return items.map(function(item, idx){
    // Title — strip source suffix
    var title = (item.title||'')
      .replace(/\s*\|\s*(Chollometro|Dealabs|Chollo).*/i,'')
      .replace(/\s*\(\d+°\)/,'')
      .replace(/&amp;/g,'&').replace(/&quot;/g,'"').trim();
    if(!title) return null;

    var desc = item.description || item.content || '';
    var all  = title+' '+desc;

    // Votes / temperature — Pepper format: "847°" in title or desc
    var tempM = (item.title||'').match(/\|\s*(\d+)°/) || all.match(/(\d+)\s*°/);
    var votes = tempM ? parseInt(tempM[1]) : 0;

    // Price — look in description for price patterns
    var prM = desc.match(/class="[^"]*price[^"]*"[^>]*>\s*([^<]*)/i)
      || all.match(/([\d]+[.,][\d]{2})\s*€/)
      || all.match(/€\s*([\d]+[.,][\d]{2})/);
    var price = prM ? pPrice(prM[1]) : null;
    if(price && price > 50000) price = null;

    // Previous price
    var pvM = desc.match(/~~([\d,.]+)\s*€~~/)
      || desc.match(/antes[:\s]*([\d,.]+)\s*€/i)
      || desc.match(/<s[^>]*>([\d,.]+)\s*€<\/s>/i);
    var prevPrice = pvM ? pPrice(pvM[1]) : null;
    if(prevPrice && price && prevPrice <= price) prevPrice = null;

    // Discount %
    var discM = desc.match(/(-\d+)\s*%/) || desc.match(/(\d+)\s*%\s*(?:de\s+)?descuento/i);
    var discPct = discM ? Math.abs(parseInt(discM[1])) : 0;
    if(!discPct && price && prevPrice) discPct = Math.round((1-price/prevPrice)*100);

    // Image — rss2json puts first image in thumbnail
    var image = item.thumbnail || null;
    if(image && (image.length<10||image.includes('pixel')||image.includes('1x1'))) image=null;
    if(!image){
      var imgM=desc.match(/<img[^>]+src=["']([^"']+)["']/i);
      if(imgM) image=imgM[1];
    }

    // Store name (Pepper includes it in description)
    var storeM = desc.match(/(?:en|at|tienda)[:\s]+<[^>]+>([^<]{2,40})<\/a>/i)
      || desc.match(/Tienda[:\s]+([^\s<]{2,30})/i);
    var storeName = storeM ? storeM[1].trim() : '';

    // Categories
    var cats = item.categories || [];
    var cat  = cats[0] || '';

    // Unique ID
    var id = (item.guid||item.link||'').replace(/[^a-z0-9]/gi,'').slice(-20) || String(idx);

    return {
      id       : id,
      title    : title,
      link     : item.link || FEEDS[src],
      price    : price,
      prevPrice: prevPrice,
      discPct  : discPct,
      votes    : votes,
      cat      : cat,
      store    : storeName,
      image    : image,
      pubDate  : item.pubDate,
      timeAgo  : item.pubDate ? relTime(new Date(item.pubDate)) : 'reciente',
      src      : src
    };
  }).filter(Boolean);
}

// ─── APPLY FILTERS & RENDER ───────────────────────────────────────────────────
function applyFilters(){
  if(!ALL_DEALS.length && ACTIVE_TAB==='deals') return;
  var filtered = ALL_DEALS.filter(function(d){
    if(MIN_TEMP > 0 && d.votes < MIN_TEMP) return false;
    if(ACTIVE_CAT && !matchCat(d.cat, ACTIVE_CAT)) return false;
    return true;
  });
  renderDeals(filtered);
}

function matchCat(cat, filter){
  if(!filter) return true;
  var catL = (cat||'').toLowerCase();
  var map = {
    'Electrónica' : ['electr','móvil','phone','tablet','laptop','pc','audio','tv','camera','tech','informática'],
    'Gaming'      : ['gaming','juego','game','consola','ps','xbox','nintendo','steam'],
    'Hogar'       : ['hogar','casa','cocina','mueble','jardín','electrodomé','aspirador'],
    'Moda'        : ['moda','ropa','zapato','complemento','fashion'],
    'Alimentación': ['aliment','comida','bebida','supermercado','food'],
    'Viajes'      : ['viaje','hotel','vuelo','travel','turismo'],
    'Deporte'     : ['deporte','sport','gym','fitness','bici','running']
  };
  var keys = map[filter] || [filter.toLowerCase()];
  return keys.some(function(k){ return catL.includes(k); });
}

function renderDeals(items){
  if(!items.length){
    setHTML('dealsBody',
      '<div class="empty-state"><div class="empty-icon">🔍</div>'
      +'<div class="empty-title">Sin resultados</div>'
      +'<div class="empty-sub">Prueba a cambiar los filtros o bajar la temperatura mínima.</div></div>');
    return;
  }

  var h = '';
  items.forEach(function(d){
    var isFav  = !!FAVS[d.id];
    var isSeen = !!HISTORY[d.id];
    var isHot  = d.votes >= 300;

    h += '<div class="deal'+(isSeen?' seen':'')+'" data-id="'+esc(d.id)+'" data-link="'+esc(d.link)+'">';

    // Image
    if(d.image){
      h += '<img class="deal-img thumb" src="'+esc(d.image)+'" loading="lazy" onerror="this.remove()">';
    }

    // HOT badge
    if(isHot) h += '<div class="hot-badge">🔥 '+d.votes+'°</div>';

    // Fav button
    h += '<button class="fav-btn" data-id="'+esc(d.id)+'" title="'+(isFav?'Quitar de favoritos':'Guardar')+'">'
      +(isFav?'⭐':'🤍')+'</button>';

    h += '<div class="deal-body">';

    // Store
    if(d.store) h += '<div class="deal-store">'+esc(d.store)+'</div>';

    // Title
    h += '<div class="deal-title">'+esc(d.title)+'</div>';

    // Price row
    h += '<div class="deal-meta">';
    if(d.price)     h += '<span class="deal-price">'+fmt(d.price)+'</span>';
    if(d.prevPrice) h += '<span class="deal-prev">'+fmt(d.prevPrice)+'</span>';
    if(d.discPct)   h += '<span class="deal-disc">-'+d.discPct+'%</span>';
    if(!isHot && d.votes) h += '<span class="deal-votes" style="margin-left:auto">🌡️ '+d.votes+'°</span>';
    h += '</div>';

    h += '</div>';// deal-body

    // Footer
    h += '<div class="deal-foot">';
    if(d.cat) h += '<span class="deal-cat">'+esc(d.cat)+'</span>';
    h += '<span class="deal-time">'+esc(d.timeAgo)+'</span>';
    h += '</div>';

    h += '</div>';// deal
  });

  h += '<button class="rel-btn" id="reloadBtn">🔄 Actualizar</button>';
  h += '<div class="cap">'+esc(ACTIVE_SRC==='chollometro'?'Chollometro':'Dealabs')+' · '+new Date().toLocaleTimeString('es-ES')+'</div>';

  setHTML('dealsBody', h);

  // Wire deal clicks
  document.querySelectorAll('#dealsBody .deal').forEach(function(el){
    el.addEventListener('click', function(e){
      // Don't trigger if clicking the fav button
      if(e.target.closest('.fav-btn')) return;
      var id   = el.getAttribute('data-id');
      var link = el.getAttribute('data-link');
      markSeen(id);
      el.classList.add('seen');
      window.open(link,'_blank','noopener');
    });
  });

  // Wire fav buttons
  document.querySelectorAll('#dealsBody .fav-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var id = btn.getAttribute('data-id');
      var deal = ALL_DEALS.find(function(d){ return d.id===id; });
      if(!deal) return;
      toggleFav(id, deal, btn);
    });
  });
}

// ─── FAVORITES ────────────────────────────────────────────────────────────────
function toggleFav(id, deal, btn){
  if(FAVS[id]){
    delete FAVS[id];
    if(btn){ btn.textContent='🤍'; btn.title='Guardar'; }
    toast('Eliminado de favoritos');
  } else {
    FAVS[id] = deal;
    if(btn){ btn.textContent='⭐'; btn.title='Quitar de favoritos'; }
    toast('⭐ Guardado en favoritos');
  }
  store('ch_favs', FAVS);
  updateFavsBadge();
}

function updateFavsBadge(){
  var count = Object.keys(FAVS).length;
  var badge = $('favsBadge');
  if(badge){
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }
}

function renderFavs(){
  var items = Object.values(FAVS);
  if(!items.length){
    setHTML('favsBody',
      '<div class="empty-state"><div class="empty-icon">⭐</div>'
      +'<div class="empty-title">Sin favoritos</div>'
      +'<div class="empty-sub">Pulsa el corazón en cualquier chollo para guardarlo aquí.</div></div>');
    return;
  }
  var h = '<div class="panel-title">Mis favoritos ('+items.length+')</div>';
  items.forEach(function(d){
    h += dealMiniCard(d, true);
  });
  h += '<button class="clear-btn" id="clearFavs">🗑️ Borrar todos los favoritos</button>';
  setHTML('favsBody', h);
  wireMiniCards('favsBody');
  var cb = $('clearFavs');
  if(cb) cb.addEventListener('click', function(){
    FAVS = {}; store('ch_favs', FAVS); updateFavsBadge(); renderFavs();
    toast('Favoritos eliminados');
  });
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function markSeen(id){
  HISTORY[id] = Date.now();
  // Keep only last 100
  var keys = Object.keys(HISTORY);
  if(keys.length > 100){
    keys.sort(function(a,b){ return HISTORY[a]-HISTORY[b]; });
    keys.slice(0, keys.length-100).forEach(function(k){ delete HISTORY[k]; });
  }
  store('ch_hist', HISTORY);
}

function renderHistory(){
  // Show history items that are still in current ALL_DEALS or FAVS
  var seenIds = Object.keys(HISTORY).sort(function(a,b){ return HISTORY[b]-HISTORY[a]; });
  var items = seenIds.map(function(id){
    return ALL_DEALS.find(function(d){ return d.id===id; }) || FAVS[id];
  }).filter(Boolean).slice(0,30);

  if(!items.length){
    setHTML('historyBody',
      '<div class="empty-state"><div class="empty-icon">🕐</div>'
      +'<div class="empty-title">Sin historial</div>'
      +'<div class="empty-sub">Los chollos que abras aparecerán aquí.</div></div>');
    return;
  }
  var h = '<div class="panel-title">Vistos recientemente ('+items.length+')</div>';
  items.forEach(function(d){ h += dealMiniCard(d, false); });
  h += '<button class="clear-btn" id="clearHist">🗑️ Borrar historial</button>';
  setHTML('historyBody', h);
  wireMiniCards('historyBody');
  var cb = $('clearHist');
  if(cb) cb.addEventListener('click', function(){
    HISTORY = {}; store('ch_hist', HISTORY); renderHistory();
    toast('Historial borrado');
  });
}

// ─── MINI CARD (for favs and history) ────────────────────────────────────────
function dealMiniCard(d, showRemove){
  var isFav = !!FAVS[d.id];
  return '<div class="deal" data-id="'+esc(d.id)+'" data-link="'+esc(d.link)+'">'
    +(d.image?'<img class="deal-img thumb" src="'+esc(d.image)+'" loading="lazy" onerror="this.remove()">':'')
    +'<button class="fav-btn" data-id="'+esc(d.id)+'">'+(isFav?'⭐':'🤍')+'</button>'
    +'<div class="deal-body">'
    +(d.store?'<div class="deal-store">'+esc(d.store)+'</div>':'')
    +'<div class="deal-title">'+esc(d.title)+'</div>'
    +'<div class="deal-meta">'
    +(d.price?'<span class="deal-price">'+fmt(d.price)+'</span>':'')
    +(d.prevPrice?'<span class="deal-prev">'+fmt(d.prevPrice)+'</span>':'')
    +(d.discPct?'<span class="deal-disc">-'+d.discPct+'%</span>':'')
    +(d.votes?'<span class="deal-votes" style="margin-left:auto">🌡️ '+d.votes+'°</span>':'')
    +'</div></div>'
    +'<div class="deal-foot">'
    +(d.cat?'<span class="deal-cat">'+esc(d.cat)+'</span>':'')
    +'<span class="deal-time">'+esc(d.timeAgo||'')+'</span>'
    +'</div></div>';
}

function wireMiniCards(containerId){
  var container = $(containerId);
  if(!container) return;
  container.querySelectorAll('.deal').forEach(function(el){
    el.addEventListener('click', function(e){
      if(e.target.closest('.fav-btn')) return;
      var id=el.getAttribute('data-id');
      var link=el.getAttribute('data-link');
      markSeen(id); el.classList.add('seen');
      window.open(link,'_blank','noopener');
    });
  });
  container.querySelectorAll('.fav-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var id=btn.getAttribute('data-id');
      var deal=ALL_DEALS.find(function(d){ return d.id===id; })||FAVS[id];
      if(deal) toggleFav(id,deal,btn);
      // Re-render the panel to reflect change
      if(containerId==='favsBody') renderFavs();
    });
  });
}

// ─── NEW DEALS COUNTER ────────────────────────────────────────────────────────
function checkForNew(src, items){
  var last = LAST_SEEN[src] ? new Date(LAST_SEEN[src]) : null;
  if(!last){ LAST_SEEN[src]=new Date().toISOString(); store('ch_last',LAST_SEEN); return; }

  var newOnes = items.filter(function(d){
    return d.pubDate && new Date(d.pubDate) > last;
  });

  var bar = $('newBar');
  if(bar && newOnes.length > 0){
    bar.textContent = '✨ '+newOnes.length+' chollos nuevos desde tu última visita';
    bar.style.display = 'block';
  }

  // Update last seen timestamp
  LAST_SEEN[src] = new Date().toISOString();
  store('ch_last', LAST_SEEN);
}

// ─── RELOAD BUTTON ────────────────────────────────────────────────────────────
// Wired dynamically after render, but also handle it here as delegation
document.getElementById('dealsBody') && document.getElementById('dealsBody')
  .addEventListener('click', function(e){
    if(e.target && e.target.id==='reloadBtn'){
      delete CACHE[ACTIVE_SRC];
      loadDeals(ACTIVE_SRC, true);
    }
  });

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
$('notifBtn').addEventListener('click', function(){
  if(!('Notification' in window)){ toast('Tu navegador no soporta notificaciones'); return; }
  if(Notification.permission==='granted'){ toast('✅ Notificaciones ya activadas'); return; }
  if(Notification.permission==='denied'){
    toast('🔒 Bloqueadas — actívalas en Ajustes del navegador'); return;
  }
  Notification.requestPermission().then(function(p){
    if(p==='granted'){
      new Notification('Chollos ✅',{body:'¡Notificaciones activadas!',icon:'icon-192.png'});
      toast('✅ Notificaciones activadas');
    } else {
      toast('Notificaciones denegadas');
    }
  });
});

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateFavsBadge();
loadDeals('chollometro');
</script>
</body>
</html>
